<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>知星日报</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#f5f6fa;color:#1a1d2e;min-height:100vh}
/* Header */
.header{background:#fff;padding:12px 24px;border-bottom:1px solid #e5e7f0;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.06);position:sticky;top:0;z-index:200}
.header h1{font-size:18px;font-weight:700}
.header h1 span{color:#6c5ce7}
.hright{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hbtn{background:#f0eeff;border:1px solid #d4ceff;color:#6c5ce7;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s;white-space:nowrap}
.hbtn:hover{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
.hbtn.sync{background:#fff;border-color:#e5e7f0;color:#4a5068}
.hbtn.sync:hover{background:#6c5ce7;color:#fff;border-color:#6c5ce7}
input[type=date]{background:#fff;border:1px solid #dde0f0;color:#1a1d2e;padding:5px 9px;border-radius:6px;font-size:12px}
/* Tab nav */
.tab-nav-main{background:#fff;border-bottom:2px solid #e5e7f0;padding:0 24px;display:flex;gap:0;position:sticky;top:57px;z-index:100}
.tnbtn{padding:10px 20px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:#8b92a5;border-bottom:2px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap}
.tnbtn:hover{color:#6c5ce7}
.tnbtn.active{color:#6c5ce7;border-bottom-color:#6c5ce7}
/* Pages */
.page{display:none;padding:18px 24px;max-width:1440px;margin:0 auto}
.page.active{display:block}
.sec-title{font-size:11px;color:#6c5ce7;font-weight:700;letter-spacing:2px;margin-bottom:10px;padding-left:7px;border-left:3px solid #6c5ce7}
/* Cards */
.kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:18px}
.kc{background:#fff;border:1px solid #e5e7f0;border-radius:10px;padding:12px 14px;position:relative;overflow:hidden;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.kc:hover{border-color:#6c5ce7;box-shadow:0 4px 14px rgba(108,92,231,.1);transform:translateY(-1px)}
.kc.alert{border-color:#e05757;background:#fff8f8;animation:pulse 2s infinite}
.kc.good{border-color:#27ae60;background:#f6fffa}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,87,87,.2)}50%{box-shadow:0 0 0 6px rgba(224,87,87,0)}}
.kl{font-size:10px;color:#8b92a5;margin-bottom:4px;font-weight:500}
.kv{font-size:20px;font-weight:700;color:#1a1d2e;line-height:1.2}
.ks{font-size:10px;color:#8b92a5;margin-top:2px}
.kchg{font-size:10px;margin-top:4px;font-weight:500}
.kchg.good{color:#27ae60}.kchg.down{color:#e05757}.kchg.flat{color:#8b92a5}
.spark{position:absolute;bottom:0;right:0;opacity:.2}
/* Charts */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}
.cc{background:#fff;border:1px solid #e5e7f0;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.cc h3{font-size:12px;color:#4a5068;margin-bottom:10px;font-weight:600}
.cw{position:relative;height:180px}
/* Alert */
.alert-bar{background:#fff5f5;border:1px solid #ffd0d0;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:12px;color:#c0392b;display:none;align-items:center;gap:8px}
.alert-bar.show{display:flex}
/* Channel */
.ch-wrap{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.ch-box{background:#fff;border:1px solid #e5e7f0;border-radius:10px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.ch-box h3{font-size:12px;font-weight:700;margin-bottom:10px;padding-bottom:8px;display:flex;align-items:center;gap:6px}
.ch-metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.ch-m{background:#f8f9fc;border-radius:7px;padding:8px;border-left:3px solid}
.ch-ml{font-size:10px;color:#8b92a5}
.ch-mv{font-size:14px;font-weight:700}
.ch-trend{background:#fff;border:1px solid #e5e7f0;border-radius:10px;padding:14px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
/* Toolbar */
.toolbar{display:flex;align-items:center;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.toolbar .lbl{font-size:11px;color:#8b92a5;white-space:nowrap}
.dg{display:flex;gap:2px;background:#f0eeff;padding:3px;border-radius:7px}
.dg button{padding:4px 12px;border-radius:5px;border:none;cursor:pointer;font-size:11px;background:transparent;color:#8b92a5;font-weight:500;transition:all .2s}
.dg button.active{background:#6c5ce7;color:#fff}
.run-btn{background:#6c5ce7;color:#fff;border:none;padding:5px 14px;border-radius:6px;cursor:pointer;font-size:12px;font-weight:500}
/* ROI chart */
.roi-wrap{position:relative;height:300px;margin-bottom:14px}
/* Form */
.form-card{background:#fff;border:1px solid #e5e7f0;border-radius:10px;padding:18px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.fg{display:grid;grid-template-columns:repeat(5,1fr);gap:9px;margin-bottom:12px}
.fi{display:flex;flex-direction:column;gap:4px}
.fi label{font-size:10px;color:#8b92a5;font-weight:500}
.fi input{background:#f8f9fc;border:1px solid #e5e7f0;color:#1a1d2e;padding:7px 9px;border-radius:6px;font-size:12px;transition:border-color .2s}
.fi input:focus{outline:none;border-color:#6c5ce7;background:#fff}
.fi input[readonly]{color:#8b92a5;background:#f0f1f7}
.fbtn{padding:7px 18px;border-radius:6px;border:none;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
.fbtn-p{background:#6c5ce7;color:#fff}.fbtn-p:hover{background:#5a4bd1}
.fbtn-s{background:#f0eeff;color:#6c5ce7;border:1px solid #d4ceff}.fbtn-s:hover{background:#6c5ce7;color:#fff}
/* Table */
.qbar{background:#fff;border:1px solid #e5e7f0;border-radius:9px;padding:10px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.qbar label{font-size:11px;color:#8b92a5}
.qsum{background:#f0eeff;border-radius:7px;padding:9px 14px;margin-bottom:10px;font-size:11px;color:#4a5068;display:none;flex-wrap:wrap;gap:16px}
.qsum.show{display:flex}
.qsum span b{color:#6c5ce7}
.tw{max-height:500px;overflow-y:auto;border:1px solid #e5e7f0;border-radius:8px}
.ht{width:100%;border-collapse:collapse;font-size:11px}
.ht th{background:#f8f9fc;color:#8b92a5;padding:7px 9px;text-align:right;font-weight:600;border-bottom:2px solid #e5e7f0;position:sticky;top:0;white-space:nowrap}
.ht th:first-child{text-align:left}
.ht td{padding:6px 9px;border-bottom:1px solid #f0f1f7;text-align:right;color:#4a5068;white-space:nowrap}
.ht td:first-child{text-align:left;color:#1a1d2e;font-weight:500}
.ht tr:hover td{background:#fafafe}
.hi{color:#6c5ce7;font-weight:600}
.rg{color:#27ae60;font-weight:600}.rb{color:#e05757;font-weight:600}
.tabnav2{display:flex;gap:2px;margin-bottom:10px;background:#f0eeff;padding:3px;border-radius:7px;width:fit-content}
.tnb2{padding:5px 16px;border-radius:5px;border:none;cursor:pointer;font-size:11px;background:transparent;color:#8b92a5;font-weight:500;transition:all .2s}
.tnb2.active{background:#6c5ce7;color:#fff}
.tc{display:none}.tc.active{display:block}
/* ROI table */
.rtw{max-height:260px;overflow:auto;border:1px solid #e5e7f0;border-radius:8px;margin-top:12px}
.rt{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap}
.rt th{background:#f8f9fc;color:#8b92a5;padding:6px 10px;text-align:right;font-weight:600;border-bottom:2px solid #e5e7f0;position:sticky;top:0}
.rt th:first-child{text-align:left;min-width:70px}
.rt td{padding:5px 10px;border-bottom:1px solid #f0f1f7;text-align:right}
.rt td:first-child{text-align:left;font-weight:500}
.rt tr:hover td{background:#fafafe}
.rtnull{color:#ddd}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(2,1fr)}.charts-row,.ch-wrap{grid-template-columns:1fr}.fg{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<!-- ═══ 登录门（简单访问保护，非强加密）═══ -->
<div id="zx-login" style="position:fixed;inset:0;z-index:99999;background:linear-gradient(135deg,#1e2746,#0f1628);display:flex;align-items:center;justify-content:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
  <div style="background:#fff;border-radius:16px;padding:36px 32px;width:320px;box-shadow:0 20px 60px rgba(0,0,0,.4);text-align:center">
    <div style="font-size:34px;margin-bottom:6px">📋</div>
    <div style="font-size:18px;font-weight:700;color:#0f1628;margin-bottom:4px">知星投放日报</div>
    <div style="font-size:12px;color:#8892a4;margin-bottom:22px">请输入账号密码访问</div>
    <input id="zx-user" placeholder="账号" autocomplete="username"
      style="width:100%;box-sizing:border-box;padding:11px 13px;margin-bottom:11px;border:1px solid #d0d5e0;border-radius:8px;font-size:14px;outline:none">
    <input id="zx-pass" type="password" placeholder="密码" autocomplete="current-password"
      style="width:100%;box-sizing:border-box;padding:11px 13px;margin-bottom:6px;border:1px solid #d0d5e0;border-radius:8px;font-size:14px;outline:none">
    <div id="zx-err" style="color:#ef4444;font-size:12px;height:16px;text-align:left;margin-bottom:10px"></div>
    <button id="zx-btn" style="width:100%;padding:11px;background:#4a7cf0;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer">登 录</button>
    <label style="display:flex;align-items:center;justify-content:center;gap:5px;margin-top:14px;font-size:12px;color:#8892a4;cursor:pointer">
      <input type="checkbox" id="zx-remember" checked style="cursor:pointer"> 记住我（本设备）
    </label>
  </div>
</div>
<script>
(function(){
  var OK = "emhpeGluZzp6aGl4aW5nMjAyNg=="; // base64("zhixing:zhixing2026")
  var KEY = "zx_auth_v1";
  var el = document.getElementById('zx-login');
  function authed(){ try{ return localStorage.getItem(KEY)===OK || sessionStorage.getItem(KEY)===OK; }catch(e){ return false; } }
  function unlock(){ el.parentNode && el.parentNode.removeChild(el); }
  if(authed()){ unlock(); return; }
  function tryLogin(){
    var u=document.getElementById('zx-user').value.trim();
    var p=document.getElementById('zx-pass').value;
    var token; try{ token=btoa(u+":"+p); }catch(e){ token=""; }
    if(token===OK){
      try{ (document.getElementById('zx-remember').checked?localStorage:sessionStorage).setItem(KEY,OK); }catch(e){}
      unlock();
    } else {
      document.getElementById('zx-err').textContent="账号或密码错误";
      document.getElementById('zx-pass').value="";
    }
  }
  document.getElementById('zx-btn').addEventListener('click',tryLogin);
  el.addEventListener('keydown',function(e){ if(e.key==='Enter') tryLogin(); });
  document.getElementById('zx-user').focus();
})();
</script>

<div class="header">
  <h1>⭐ 知星<span>日报</span></h1>
  <div class="hright">
    <button class="hbtn" onclick="changeDate(-1)">◀ 前一天</button>
    <input type="date" id="datePicker" onchange="loadDate(this.value)">
    <button class="hbtn" onclick="changeDate(1)">后一天 ▶</button>
    <button class="hbtn" onclick="showLatest()">最新</button>
    <button class="hbtn sync" id="syncBtn" onclick="doSync()">🔄 同步</button>
  </div>
</div>

<nav class="tab-nav-main">
  <button class="tnbtn active" onclick="switchPage('overview',this)">📊 概览</button>
  <button class="tnbtn" onclick="switchPage('channel',this)">📡 分渠道</button>
  <button class="tnbtn" onclick="switchPage('roi',this)">📈 ROI曲线</button>
  <button class="tnbtn" onclick="switchPage('form',this)">📝 录入</button>
  <button class="tnbtn" onclick="switchPage('table',this)">🗂 数据目录</button>
</nav>

<!-- 概览 -->
<div id="page-overview" class="page active">
  <div id="alertBar" class="alert-bar">⚠️ <span id="alertMsg"></span></div>
  <div class="toolbar" style="margin-bottom:14px">
    <div class="dg" id="ov-mode-group">
      <button class="active" onclick="switchOvMode('day',this)">单日查看</button>
      <button onclick="switchOvMode('range',this)">区间汇总</button>
    </div>
    <span id="ov-range-bar" style="display:none;align-items:center;gap:8px;margin-left:10px">
      <input type="date" id="ov-s"><span style="color:#8b92a5;font-size:12px">至</span>
      <input type="date" id="ov-e">
      <button class="run-btn" onclick="applyOvRange()">查询</button>
      <span id="ov-hint" style="font-size:11px;color:#8b92a5"></span>
    </span>
  </div>
  <div class="sec-title" id="ov-kpi-title">核心指标</div>
  <div class="kpi-grid">
    <div class="kc"><div class="kl">消耗</div><div class="kv" id="v-spend">—</div><div class="kchg" id="c-spend"></div><svg class="spark" id="sp-spend" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">ARPU / ARPPU</div><div class="kv" id="v-arpu">—</div><div class="ks" id="s-arppu"></div><div class="kchg" id="c-arpu"></div><svg class="spark" id="sp-arpu" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">注册</div><div class="kv" id="v-reg">—</div><div class="ks" id="s-reg"></div><div class="kchg" id="c-reg"></div><svg class="spark" id="sp-reg" width="70" height="36"></svg></div>
    <div class="kc" id="kpi-roi"><div class="kl">首日ROI</div><div class="kv" id="v-roi">—</div><div class="ks">目标≥15%</div><div class="kchg" id="c-roi"></div><svg class="spark" id="sp-roi" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">次日留存</div><div class="kv" id="v-nextret">—</div><div class="kchg" id="c-nextret"></div><svg class="spark" id="sp-nextret" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">付费数/金额</div><div class="kv" id="v-pay">—</div><div class="ks" id="s-pay"></div><div class="kchg" id="c-pay"></div><svg class="spark" id="sp-pay" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">进房/进房率</div><div class="kv" id="v-enter">—</div><div class="ks" id="s-enter"></div><div class="kchg" id="c-enter"></div><svg class="spark" id="sp-enter" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">连麦/连麦率</div><div class="kv" id="v-mic">—</div><div class="ks" id="s-mic"></div><div class="kchg" id="c-mic"></div><svg class="spark" id="sp-mic" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">AI提问</div><div class="kv" id="v-ai">—</div><div class="kchg" id="c-ai"></div><svg class="spark" id="sp-ai" width="70" height="36"></svg></div>
    <div class="kc"><div class="kl">注册成本</div><div class="kv" id="v-regcost">—</div><div class="ks">越低越好</div><div class="kchg" id="c-regcost"></div><svg class="spark" id="sp-regcost" width="70" height="36"></svg></div>
  </div>
  <div class="sec-title" id="ov-chart-title">近7日趋势</div>
  <div class="charts-row">
    <div class="cc"><h3>消耗 & 注册量</h3><div class="cw"><canvas id="ch-spend-reg"></canvas></div></div>
    <div class="cc"><h3>ROI & 次日留存</h3><div class="cw"><canvas id="ch-roi-ret"></canvas></div></div>
    <div class="cc"><h3>进房率 & 连麦率</h3><div class="cw"><canvas id="ch-room-mic"></canvas></div></div>
    <div class="cc"><h3>注册成本 & AI提问</h3><div class="cw"><canvas id="ch-cost-ai"></canvas></div></div>
  </div>
</div>

<!-- 分渠道 -->
<div id="page-channel" class="page">
  <div class="toolbar">
    <span class="lbl">日期范围</span>
    <input type="date" id="ch-s"><span style="color:#8b92a5;font-size:12px">至</span>
    <input type="date" id="ch-e">
    <button class="run-btn" onclick="renderChannel()">更新</button>
    <span class="lbl" style="margin-left:8px">对比指标</span>
    <div class="dg" id="ch-metric-group">
      <button class="active" onclick="setChMetric('spend',this)">消耗</button>
      <button onclick="setChMetric('reg',this)">注册</button>
      <button onclick="setChMetric('regCost',this)">注册成本</button>
      <button onclick="setChMetric('roi',this)">ROI</button>
      <button onclick="setChMetric('payAmount',this)">充值</button>
      <button onclick="setChMetric('enterRoomRate',this)">进房率</button>
      <button onclick="setChMetric('micRate',this)">连麦率</button>
    </div>
  </div>
  <!-- 渠道卡片 -->
  <div class="ch-wrap">
    <div class="ch-box">
      <h3 style="color:#6c5ce7;border-bottom:2px solid #6c5ce7;padding-bottom:8px">📺 信息流<span id="ch-xl-days" style="font-size:10px;font-weight:400;color:#8b92a5;margin-left:8px"></span></h3>
      <div class="ch-metrics" id="ch-xl-metrics"></div>
    </div>
    <div class="ch-box">
      <h3 style="color:#0984e3;border-bottom:2px solid #0984e3;padding-bottom:8px">📱 应用商店<span id="ch-ys-days" style="font-size:10px;font-weight:400;color:#8b92a5;margin-left:8px"></span></h3>
      <div class="ch-metrics" id="ch-ys-metrics"></div>
    </div>
  </div>
  <!-- 趋势图 -->
  <div class="ch-trend"><div style="position:relative;height:220px"><canvas id="ch-trend"></canvas></div></div>
  <!-- 明细表 -->
  <div class="tw"><table class="ht" id="ch-tbl"></table></div>
  <!-- 渠道ROI回收曲线 -->
  <div style="margin-top:18px">
    <div class="sec-title">渠道ROI长期回收曲线</div>
    <div class="toolbar" style="margin-top:8px">
      <span class="lbl">队列维度</span>
      <div class="dg" id="ch-roi-dim-group">
        <button class="active" onclick="setChRoiDim('month',this)">月</button>
        <button onclick="setChRoiDim('week',this)">周</button>
        <button onclick="setChRoiDim('day',this)">日</button>
      </div>
      <span class="lbl" style="margin-left:10px">指标</span>
      <div class="dg" id="ch-roi-mode-group">
        <button class="active" onclick="setChRoiMode('roi',this)">首日ROI% →长期</button>
        <button onclick="setChRoiMode('ltv',this)">LTV累计充值(¥)</button>
      </div>
      <span id="ch-roi-hint" style="font-size:11px;color:#8b92a5;margin-left:8px"></span>
    </div>
    <div class="ch-trend" style="margin-top:8px"><div style="position:relative;height:280px"><canvas id="ch-roi-chart"></canvas></div></div>
  </div>
</div>

<!-- ROI曲线 -->
<div id="page-roi" class="page">
  <div class="toolbar">
    <span class="lbl">维度</span>
    <div class="dg" id="roi-dim-group">
      <button class="active" onclick="setRoiDim('day',this)">日</button>
      <button onclick="setRoiDim('week',this)">周</button>
      <button onclick="setRoiDim('month',this)">月</button>
      <button onclick="setRoiDim('quarter',this)">季</button>
    </div>
    <span class="lbl" style="margin-left:8px">队列范围</span>
    <input type="date" id="roi-s"><span style="color:#8b92a5;font-size:12px">至</span>
    <input type="date" id="roi-e">
    <button class="run-btn" onclick="renderRoi()">更新</button>
    <span id="roi-hint" style="font-size:11px;color:#8b92a5"></span>
  </div>
  <div class="roi-wrap"><canvas id="roi-chart"></canvas></div>
  <div class="rtw"><table class="rt" id="roi-tbl"></table></div>
</div>

<!-- 录入 -->
<div id="page-form" class="page">
  <div class="form-card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-weight:600;font-size:15px">数据录入</span>
      <span style="font-size:11px;color:#8b92a5" id="editingDate"></span>
    </div>
    <div class="fg">
      <div class="fi"><label>日期</label><input type="date" id="f-date"></div>

// ── 存储 ────────────────────────────────────────────────────
function load(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch(e){return[]}}
function save(d){localStorage.setItem(STORAGE_KEY,JSON.stringify(d))}
function loadCh(){try{return JSON.parse(localStorage.getItem(CH_KEY)||'{}')}catch(e){return{}}}
function saveCh(d){localStorage.setItem(CH_KEY,JSON.stringify(d))}

function init(){
  if(localStorage.getItem('zhixing_seed_ver')!==SEED_VER){
    const ex=load(),ue=ex.filter(e=>!FALLBACK.find(s=>s.date===e.date));
    const mg=[...FALLBACK,...ue].sort((a,b)=>a.date.localeCompare(b.date));
    save(mg);
    // 种入渠道数据
    saveCh(CH_FALLBACK);
    localStorage.setItem('zhixing_seed_ver',SEED_VER);
  }
}

// ── Gist同步 ────────────────────────────────────────────────
async function doSync(){
  const btn=document.getElementById('syncBtn');
  btn.textContent='同步中…';btn.disabled=true;
  try{
    const res=await fetch(GIST_URL+'?t='+Date.now());
    if(!res.ok)throw new Error('fetch fail');
    const raw=await res.json();
    const dailyArr=Array.isArray(raw)?raw:(raw.daily||[]);
    const chData=Array.isArray(raw)?{}:(raw.channelData||{});
    if(!dailyArr.length)throw new Error('empty');
    const ex=load();
    const gistNonFb=dailyArr.filter(e=>!FALLBACK.find(s=>s.date===e.date));
    const exNonFbNonGist=ex.filter(e=>!FALLBACK.find(s=>s.date===e.date)&&!dailyArr.find(s=>s.date===e.date));
    const mg=[...FALLBACK,...gistNonFb,...exNonFbNonGist].sort((a,b)=>a.date.localeCompare(b.date));
    save(mg);const mergedCh=Object.assign({},CH_FALLBACK,chData);saveCh(mergedCh);
    localStorage.setItem('zhixing_seed_ver',SEED_VER);
    btn.textContent='✓ 已同步';
    setTimeout(()=>{btn.textContent='🔄 同步';btn.disabled=false;},2000);
    showLatest();renderChannel();renderChRoi();
    console.log('同步成功 daily:',mg.length,'渠道:',Object.keys(chData).length);
  }catch(e){
    btn.textContent='同步失败';
    setTimeout(()=>{btn.textContent='🔄 同步';btn.disabled=false;},2000);
    console.warn('同步失败',e);
  }
}

// ── 工具函数 ────────────────────────────────────────────────
function fmt(n,d=0){if(n==null||isNaN(n)||n==='')return'—';return Number(n).toLocaleString('zh-CN',{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtP(n){if(n==null||isNaN(n))return'—';return Number(n).toFixed(2)+'%'}
function sv(id,v){const e=document.getElementById(id);if(e)e.textContent=v}
function sc(id,c){const e=document.getElementById(id);if(e)e.className='kchg '+c}
function chg(c,p,k,lo=false){
  if(!c||!p||c[k]==null||p[k]==null)return{text:'',cls:'flat'};
  const d=c[k]-p[k],pc=p[k]!==0?(d/p[k]*100).toFixed(1):0;
  if(Math.abs(pc)<0.5)return{text:'持平',cls:'flat'};
  return{text:(d>0?'▲':'▼')+' '+Math.abs(pc)+'%',cls:(lo?d<0:d>0)?'good':'down'};
}
function drawSp(id,vals,inv=false){
  const svg=document.getElementById(id);if(!svg||vals.length<2)return;
  const w=70,h=36,p=3,mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
  svg.innerHTML='<polyline points="'+vals.map((v,i)=>(p+i*(w-p*2)/(vals.length-1))+','+(h-p-(v-mn)/rng*(h-p*2))).join(' ')+'" fill="none" stroke="'+(inv?'#e05757':'#6c5ce7')+'" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>';
}

  curDate=date;
  document.getElementById('datePicker').value=date;
  document.getElementById('editingDate').textContent='查看：'+date;
  const all=load().sort((a,b)=>a.date.localeCompare(b.date));
  const idx=all.findIndex(r=>r.date===date);
  updateKPIs(idx>=0?all[idx]:null,idx>0?all[idx-1]:null,all);
  updateCharts(date,all);
  checkAlerts(idx>=0?all[idx]:null);
  fillFormFromRecord(idx>=0?all[idx]:null,date);
}

// ── KPI ────────────────────────────────────────────────────
function updateKPIs(rec,prev,all){
  if(!rec){['spend','activate','reg','roi','nextret','pay','enter','mic','ai','regcost'].forEach(k=>sv('v-'+k,'—'));return;}
  let c;
  sv('v-spend','¥'+fmt(rec.spend,0));c=chg(rec,prev,'spend');sv('c-spend',c.text);sc('c-spend',c.cls);
  const arpu=rec.payAmount&&rec.reg?(rec.payAmount/rec.reg):0;
  const arppu=rec.payAmount&&rec.payCount?(rec.payAmount/rec.payCount):0;
  sv('v-arpu','¥'+fmt(arpu,2));sv('s-arppu','ARPPU ¥'+fmt(arppu,2));
  c=chg(rec,prev,'payAmount');sv('c-arpu',c.text);sc('c-arpu',c.cls);
  sv('v-reg',fmt(rec.reg));sv('s-reg','成本 ¥'+fmt(rec.regCost,2));c=chg(rec,prev,'reg');sv('c-reg',c.text);sc('c-reg',c.cls);
  const roi=rec.roi||0;sv('v-roi',fmtP(roi));document.getElementById('kpi-roi').className='kc'+(roi>=15?' good':roi>0&&roi<10?' alert':'');
  c=chg(rec,prev,'roi');sv('c-roi',c.text);sc('c-roi',c.cls);
  sv('v-nextret',rec.nextRetention>0?fmtP(rec.nextRetention):'—');c=chg(rec,prev,'nextRetention');sv('c-nextret',c.text);sc('c-nextret',c.cls);
  sv('v-pay',fmt(rec.payCount)+' / ¥'+fmt(rec.payAmount,0));sv('s-pay','充值率 '+fmtP(rec.payRate));c=chg(rec,prev,'payCount');sv('c-pay',c.text);sc('c-pay',c.cls);
  sv('v-enter',fmt(rec.enterRoom));sv('s-enter','进房率 '+fmtP(rec.enterRoomRate));c=chg(rec,prev,'enterRoom');sv('c-enter',c.text);sc('c-enter',c.cls);
  sv('v-mic',fmt(rec.mic));sv('s-mic','连麦率 '+fmtP(rec.micRate));c=chg(rec,prev,'mic');sv('c-mic',c.text);sc('c-mic',c.cls);
  sv('v-ai',fmt(rec.ai));c=chg(rec,prev,'ai');sv('c-ai',c.text);sc('c-ai',c.cls);
  sv('v-regcost','¥'+fmt(rec.regCost,2));c=chg(rec,prev,'regCost',true);sv('c-regcost',c.text);sc('c-regcost',c.cls);
  const r7=all.filter(r=>r.date<=curDate).slice(-7);
  [['sp-spend','spend'],['sp-arpu','payAmount'],['sp-reg','reg'],['sp-roi','roi'],['sp-nextret','nextRetention'],['sp-pay','payCount'],['sp-enter','enterRoom'],['sp-mic','mic'],['sp-ai','ai'],['sp-regcost','regCost',true]]
    .forEach(([id,k,inv])=>drawSp(id,r7.map(r=>r[k]||0),inv));
}

function updateCharts(date,all){

    scales:{y:{grid:{color:'#f0f1f7'},ticks:{font:{size:9}}},...(y1?{y1:{position:'right',grid:{display:false},ticks:{font:{size:9}}}}:{})}});

  mc('ch-room-mic',{type:'line',data:{labels:lb,datasets:[{label:'进房率%',data:r7.map(r=>r.enterRoomRate||0),borderColor:'#0984e3',tension:.3,backgroundColor:'transparent'},{label:'连麦率%',data:r7.map(r=>r.micRate||0),borderColor:'#e17055',tension:.3,backgroundColor:'transparent'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{size:10},boxWidth:10}}},scales:{y:{grid:{color:'#f0f1f7'},ticks:{font:{size:9},callback:v=>v+'%'}}}}});

function applyOvRange(){
  const s=document.getElementById('ov-s').value, e=document.getElementById('ov-e').value;
  const all=load().sort((a,b)=>a.date.localeCompare(b.date));
  const recs=all.filter(r=>(!s||r.date>=s)&&(!e||r.date<=e));
  sv('ov-hint',recs.length?'共 '+recs.length+' 天':'无数据');
  sv('ov-kpi-title','核心指标（区间汇总'+(s&&e?' '+s+' 至 '+e:'')+'）');
  sv('ov-chart-title','趋势（区间全览）');
  updateKPIsRange(recs);
  updateChartsRange(recs);
  checkAlerts(recs.length?recs[recs.length-1]:null);
}

function updateKPIsRange(recs){
  if(!recs.length){
    ['spend','activate','reg','roi','nextret','pay','enter','mic','ai','regcost'].forEach(k=>sv('v-'+k,'—'));
    return;
  }
  const tSp=recs.reduce((s,r)=>s+(r.spend||0),0);
  const tAct=recs.reduce((s,r)=>s+(r.activate||0),0);
  const tReg=recs.reduce((s,r)=>s+(r.reg||0),0);
  const tPay=recs.reduce((s,r)=>s+(r.payCount||0),0);
  const tAmt=recs.reduce((s,r)=>s+(r.payAmount||0),0);
  const tEnter=recs.reduce((s,r)=>s+(r.enterRoom||0),0);
  const tMic=recs.reduce((s,r)=>s+(r.mic||0),0);
  const tAi=recs.reduce((s,r)=>s+(r.ai||0),0);
  const roi=tSp>0?Math.round(tAmt/tSp*10000)/100:0;
  const rc=tReg>0?Math.round(tSp/tReg*100)/100:0;
  const payRate=tReg>0?Math.round(tPay/tReg*10000)/100:0;
  const enterRate=tReg>0?Math.round(tEnter/tReg*10000)/100:0;
  const micRate=tReg>0?Math.round(tMic/tReg*10000)/100:0;
  const retRecs=recs.filter(r=>r.nextRetention>0);
  const avgRet=retRecs.length?Math.round(retRecs.reduce((s,r)=>s+r.nextRetention,0)/retRecs.length*100)/100:0;
  const n=recs.length;

  sv('v-spend','¥'+fmt(tSp,0));sv('c-spend','共'+n+'天 / 均¥'+fmt(tSp/n,0));sc('c-spend','flat');
  sv('v-activate',fmt(tAct));sv('c-activate','均'+fmt(tAct/n,0)+'/天');sc('c-activate','flat');
  sv('v-reg',fmt(tReg));sv('s-reg','成本 ¥'+fmt(rc,2));sv('c-reg','均'+fmt(tReg/n,0)+'/天');sc('c-reg','flat');
  sv('v-roi',fmtP(roi));

// ── 渠道ROI回收曲线 ────────────────────────────────────────
let chRoiDim='month', chRoiMode='roi', chRoiChart=null;
function setChRoiDim(d,btn){
  chRoiDim=d;
  document.querySelectorAll('#ch-roi-dim-group button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');

  btn.classList.add('active');
  renderChRoi();

function renderChRoi(){
  // ROI曲线：chCurve[N] = totalCurve[N] × (ch.roi / total.roi0)  ← 等比缩放近似
  // LTV曲线：chLTV[N]  = chCurve[N] × ch.spend / 100
  const chData=loadCh();
  const s=document.getElementById('ch-s').value, e=document.getElementById('ch-e').value;
  const all=load().sort((a,b)=>a.date.localeCompare(b.date));
  const filtered=all.filter(r=>(!s||r.date>=s)&&(!e||r.date<=e)&&r.roiCurve);
  const isLtv=chRoiMode==='ltv';

  const CH_CFG=[
    {ch:'信息流', colors:['#6c5ce7','#9b8ff0','#a29bfe','#c3baff','#7d6ef0','#5a4bd1']},
    {ch:'应用商店', colors:['#0984e3','#2d98da','#54a0ff','#74b9ff','#0097e6','#1289d8']}
  ];
  const datasets=[];
  let totalGroups=0;

  for(const {ch, colors} of CH_CFG){
    const groups={};
    for(const r of filtered){
      const cd=chData[r.date]?.[ch];
      if(!cd||!cd.roi||!cd.spend) continue;
      const totalRoi0=r.roiCurve[0];
      if(!totalRoi0||totalRoi0<=0) continue;
      const scale=cd.roi/totalRoi0;
      const k=getGroupKey(r.date,chRoiDim);
      if(!groups[k])groups[k]=[];
      // 存完整信息，用于消耗加权
      groups[k].push({r, cd, scale});
    }
    const keys=Object.keys(groups).sort();
    totalGroups=Math.max(totalGroups,keys.length);
    keys.forEach((k,gi)=>{
      // 消耗加权聚合（与总体ROI曲线口径一致）
      const avg=ROI_DAYS.map((_,i)=>{
        let tSpend=0,tAmt=0;
        for(const {r,cd,scale} of groups[k]){
          const v=r.roiCurve&&r.roiCurve[i];
          if(v==null||!cd.spend)continue;
          const chRoi=v*scale; // 渠道估算ROI%
          if(isLtv){tAmt+=chRoi*cd.spend/100;tSpend+=cd.spend;}
          else{tAmt+=chRoi*cd.spend/100;tSpend+=cd.spend;}
        }
        if(!tSpend)return null;
        return isLtv?Math.round(tAmt):(Math.round(tAmt/tSpend*10000)/100);
      });
      datasets.push({
        label:ch+' '+k,
        data:avg,
        borderColor:colors[gi%colors.length],
        backgroundColor:'transparent',
        tension:.4,pointRadius:2,borderWidth:ch==='信息流'?2:1.5,
        borderDash:ch==='应用商店'?[5,3]:[],
        spanGaps:false
      });
    });
  }

  const hint=document.getElementById('ch-roi-hint');
  if(hint)hint.textContent=totalGroups?'共 '+totalGroups+' 个队列 ｜ 实线=信息流 虚线=应用商店':'暂无数据';

  if(chRoiChart)chRoiChart.destroy();
  const ctx2=document.getElementById('ch-roi-chart');
  if(!ctx2)return;
  const yLabel=isLtv?'累计充值LTV (¥)':'累计ROI %';
  const yCb=isLtv?(v=>'¥'+Number(v).toLocaleString()):(v=>v+'%');
  chRoiChart=new Chart(ctx2.getContext('2d'),{
    type:'line',data:{labels:ROI_DAYS.map(d=>'D'+d),datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:datasets.length<=18,position:'right',labels:{font:{size:9},boxWidth:14,padding:5}}},
      scales:{
        x:{grid:{color:'#f0f1f7'},ticks:{font:{size:9}}},
        y:{grid:{color:'#f0f1f7'},ticks:{font:{size:9},callback:yCb},
           title:{display:true,text:yLabel,font:{size:10},color:'#8b92a5'}}
      }
    }
  });
}

// ── ROI曲线 ────────────────────────────────────────────────
let roiDim='day',roiChart=null;
function setRoiDim(d,btn){roiDim=d;document.querySelectorAll('#roi-dim-group button').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderRoi();}
function initRoiDates(){
  const all=load().sort((a,b)=>b.date.localeCompare(a.date));if(!all.length)return;
  const end=all[0].date,st=new Date(end);st.setMonth(st.getMonth()-3);
  document.getElementById('roi-s').value=st.toISOString().slice(0,10);
  document.getElementById('roi-e').value=end;
}
function getGroupKey(date,dim){
  const d=new Date(date+'T00:00:00'),y=d.getFullYear(),m=d.getMonth()+1;
  if(dim==='day')return date;
  if(dim==='month')return y+'/'+(m<10?'0'+m:m);
  if(dim==='quarter')return y+'/Q'+Math.ceil(m/3);
  const jan1=new Date(y,0,1),dow=jan1.getDay()||7,wk=Math.ceil((((d-jan1)/86400000)+dow)/7);
  return y+'/W'+(wk<10?'0'+wk:wk);
}
function renderRoi(){
  const all=load().sort((a,b)=>a.date.localeCompare(b.date));
  const s=document.getElementById('roi-s').value,e=document.getElementById('roi-e').value;
  const filtered=all.filter(r=>(!s||r.date>=s)&&(!e||r.date<=e)&&r.roiCurve);
  const groups={};
  for(const r of filtered){
    const k=getGroupKey(r.date,roiDim);
    if(!groups[k])groups[k]=[];
    groups[k].push(r); // 保留完整记录，用消耗加权
  }
  const keys=Object.keys(groups).sort();
  sv('roi-hint','共 '+keys.length+' 个'+{day:'日',week:'周',month:'月',quarter:'季'}[roiDim]+'队列');
  const datasets=keys.map((k,gi)=>{
    const recs=groups[k];
    // 消耗加权：Σ(roi%*spend)/Σspend ← 与月度统计口径一致
    const lastDate=recs[recs.length-1].date;
    const avg=ROI_DAYS.map((days,i)=>{
      // 该月最后一天 + days 天 未到，说明整月数据还未成熟，不显示
      const maturity=new Date(lastDate);maturity.setDate(maturity.getDate()+days);
      const today=new Date();today.setHours(0,0,0,0);
      if(maturity>today)return null;
      // 已到期：用有数据的日期做加权平均（兼容历史月份部分null）
      let tSpend=0,tAmt=0;
      for(const r of recs){
        const v=r.roiCurve&&r.roiCurve[i];
        if(v!=null&&r.spend>0){tAmt+=v*r.spend/100;tSpend+=r.spend;}
      }
      return tSpend>0?(Math.round(tAmt/tSpend*10000)/100):null;
    });
    return{label:k,data:avg,borderColor:PALETTE[gi%PALETTE.length],backgroundColor:'transparent',tension:.4,pointRadius:3,borderWidth:2,spanGaps:false};
  });
  if(roiChart)roiChart.destroy();
  roiChart=new Chart(document.getElementById('roi-chart').getContext('2d'),{
    type:'line',data:{labels:ROI_DAYS.map(d=>'D'+d),datasets},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:keys.length<=20,position:'right',labels:{font:{size:10},boxWidth:16,padding:6}}},
      scales:{x:{grid:{color:'#f0f1f7'},ticks:{font:{size:10}}},y:{grid:{color:'#f0f1f7'},ticks:{font:{size:10},callback:v=>v+'%'},title:{display:true,text:'ROI %',font:{size:10},color:'#8b92a5'}}}}
  });
  const tbl=document.getElementById('roi-tbl');
  tbl.innerHTML='<thead><tr><th>队列</th>'+ROI_DAYS.map(d=>'<th>D'+d+'</th>').join('')+'</tr></thead><tbody>'+
    keys.map((k,gi)=>'<tr><td style="color:'+PALETTE[gi%PALETTE.length]+'">'+k+'</td>'+datasets[gi].data.map(v=>v!=null?'<td>'+v.toFixed(1)+'%</td>':'<td class="rtnull">—</td>').join('')+'</tr>').join('')+'</tbody>';
}

  renderTable('tbl-qr',qData);
  if(qData.length){
    const tSp=qData.reduce((s,r)=>s+(r.spend||0),0),tReg=qData.reduce((s,r)=>s+(r.reg||0),0);
    const tPay=qData.reduce((s,r)=>s+(r.payCount||0),0),tAmt=qData.reduce((s,r)=>s+(r.payAmount||0),0);
    const el=document.getElementById('qsum');el.className='qsum show';
    el.innerHTML='<span>共 <b>'+qData.length+'</b> 天</span><span>总消耗 <b>¥'+fmt(tSp,0)+'</b></span><span>总注册 <b>'+fmt(tReg)+'</b></span><span>总付费 <b>'+tPay+'</b></span><span>总充值 <b>¥'+fmt(tAmt,0)+'</b></span><span>平均ROI <b>'+(tSp>0?(tAmt/tSp*100).toFixed(2)+'%':'—')+'</b></span>';
  }else document.getElementById('qsum').className='qsum';
  document.querySelectorAll('.tnb2').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  document.getElementById('tabQr').classList.add('active');
  document.getElementById('tc-qr').classList.add('active');
}
function resetQuery(){
  document.getElementById('q-s').value='';document.getElementById('q-e').value='';
  document.getElementById('qsum').className='qsum';qData=[];
  renderTable('tbl-qr',[]);
  switchTab('r30',document.querySelector('.tnb2'));
}
function switchTab(name,btn){
  document.querySelectorAll('.tnb2').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(c=>c.classList.remove('active'));
  btn.classList.add('active');document.getElementById('tc-'+name).classList.add('active');
}

// ── 启动 ────────────────────────────────────────────────────
init();
showLatest();
initChDates();
initRoiDates();
doSync();
</script>
